services:
    php:
        build: .docker/php
        volumes:
            - ./backend:/var/www:cached
        networks:
        - app-network

    nginx:
        image: nginx
        ports:
            - 8080:80
        volumes:
            - ./backend:/var/www
            - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - .docker/nginx/nginx.conf:/etc/nginx/nginx.conf
        depends_on:
            - php
        networks:
        - app-network

    db:
        image: mysql:8.1
        ports:
            - 3307:3306
        volumes:
            - db_data:/var/lib/mysql
            - .docker/db/my.cnf:/etc/mysql/conf.d/my.cnf
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: refactorian
            MYSQL_USER: refactorian
            MYSQL_PASSWORD: refactorian
        networks:
        - app-network
    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        ports:
            - 8081:80
        links:
            - db
        environment:
            PMA_HOST: db
            PMA_PORT: 3306
            PMA_ARBITRARY: 1
        volumes:
            - .docker/phpmyadmin/sessions:/sessions
        depends_on:
            - db
        networks:
        - app-network

    adminer:
        image: adminer
        ports:
            - 8082:8080
        depends_on:
        - db
        networks:
        - app-network
    mail:
        image: axllent/mailpit:latest
        ports:
        - 8083:8025
        - 8084:1025
        networks:
        - app-network

    redis:
        image: redis:latest
        command: redis-server --appendonly yes
        volumes:
        - .docker/redis/data:/data
        ports:
        - 8085:6379
        networks:
        - app-network
volumes:
  db_data:


networks:
  app-network:
    driver: bridge
